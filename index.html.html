<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FixTrack Build Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --bg2: #161b27;
    --bg3: #1e2535;
    --bg4: #252d40;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #e8eaf0;
    --text2: #8b92a8;
    --text3: #555e78;
    --accent: #3b82f6;
    --accent2: #1d4ed8;
    --green-bg: rgba(34,197,94,0.1);
    --green-border: rgba(34,197,94,0.25);
    --amber-bg: rgba(245,158,11,0.1);
    --amber-border: rgba(245,158,11,0.25);
    --blue-bg: rgba(59,130,246,0.12);
    --blue-border: rgba(59,130,246,0.3);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,0.1);
    --red-border: rgba(239,68,68,0.25);
    --radius: 8px;
    --radius-lg: 12px;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; min-height: 100vh; }

  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    display: flex; align-items: center; justify-content: space-between;
    height: 56px; gap: 16px; flex-wrap: wrap;
    position: sticky; top: 0; z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-mark {
    width: 32px; height: 32px; background: var(--accent);
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 13px; font-weight: 500; color: #fff; flex-shrink: 0;
  }
  .logo-text { font-size: 15px; font-weight: 600; color: var(--text); }
  .logo-sub  { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-top: 1px; }
  .header-stats { display: flex; gap: 6px; flex-wrap: wrap; }
  .hstat {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 6px; padding: 3px 10px;
    font-size: 12px; color: var(--text2); font-family: var(--mono);
  }
  .hstat b { color: var(--text); }
  .header-right { display: flex; gap: 8px; align-items: center; }

  .sync-status {
    font-size: 11px; font-family: var(--mono);
    color: var(--text3); display: flex; align-items: center; gap: 5px;
  }
  .sync-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text3); flex-shrink: 0; transition: background 0.3s;
  }
  .sync-dot.ok     { background: #22c55e; }
  .sync-dot.saving { background: #f59e0b; }
  .sync-dot.error  { background: var(--red); }

  .btn {
    padding: 6px 14px; font-size: 12px; font-family: var(--sans);
    border-radius: var(--radius); border: 1px solid var(--border2);
    background: transparent; color: var(--text2); cursor: pointer; transition: all 0.15s;
  }
  .btn:hover { background: var(--bg3); color: var(--text); }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.primary:hover { background: var(--accent2); border-color: var(--accent2); }
  .btn.danger { color: var(--red); border-color: var(--red-border); }
  .btn.danger:hover { background: var(--red-bg); }

  .progress-section { padding: 12px 20px 0; }
  .progress-meta {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--text3); font-family: var(--mono); margin-bottom: 6px;
  }
  .progress-track { height: 3px; background: var(--bg3); border-radius: 2px; overflow: hidden; margin-bottom: 12px; }
  .progress-fill  { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }

  .phase-bar { padding: 0 20px 12px; display: flex; gap: 6px; flex-wrap: wrap; }
  .phase-pill {
    padding: 4px 10px; font-size: 11px; font-family: var(--mono);
    border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--text3); cursor: pointer; transition: all 0.15s;
  }
  .phase-pill:hover { color: var(--text2); border-color: var(--border2); }
  .phase-pill.active { background: var(--blue-bg); color: var(--accent); border-color: var(--blue-border); }

  .board {
    display: grid; grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px; padding: 0 20px 30px; align-items: start;
  }
  .column { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .col-header {
    padding: 12px 14px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .col-header-left { display: flex; align-items: center; gap: 8px; }
  .col-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .col-title { font-size: 12px; font-weight: 500; color: var(--text); }
  .col-count {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 10px; padding: 1px 8px;
    font-size: 11px; color: var(--text3); font-family: var(--mono);
  }
  .col-body { padding: 8px; min-height: 80px; transition: background 0.15s; }
  .col-body.drag-over { background: var(--blue-bg); border-radius: 0 0 var(--radius-lg) var(--radius-lg); }

  .card {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 12px; margin-bottom: 6px;
    cursor: grab; user-select: none; transition: border-color 0.15s, opacity 0.15s;
  }
  .card:last-child { margin-bottom: 0; }
  .card:hover { border-color: var(--border2); }
  .card:active { cursor: grabbing; }
  .card.dragging { opacity: 0.35; }

  .card-phase-tag { font-size: 10px; font-family: var(--mono); font-weight: 500; margin-bottom: 5px; opacity: 0.85; }
  .card-title { font-size: 12px; font-weight: 500; color: var(--text); line-height: 1.5; margin-bottom: 8px; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
  .type-badge {
    padding: 2px 7px; border-radius: 6px;
    font-size: 10px; font-family: var(--mono); font-weight: 500; flex-shrink: 0;
  }
  .type-prompt   { background: var(--blue-bg);  color: #60a5fa; border: 1px solid var(--blue-border); }
  .type-terminal { background: var(--green-bg); color: #4ade80; border: 1px solid var(--green-border); }
  .type-test     { background: var(--amber-bg); color: #fbbf24; border: 1px solid var(--amber-border); }
  .type-todo     { background: var(--bg4);       color: var(--text3); border: 1px solid var(--border); }
  .card-actions { display: flex; gap: 4px; }
  .card-btn {
    padding: 2px 7px; font-size: 10px; font-family: var(--mono);
    border-radius: 5px; border: 1px solid var(--border);
    background: transparent; color: var(--text3); cursor: pointer; transition: all 0.1s;
  }
  .card-btn:hover { background: var(--bg4); color: var(--text2); }
  .card-btn.del:hover { background: var(--red-bg); color: var(--red); border-color: var(--red-border); }
  .card-note {
    font-size: 11px; color: var(--text3); font-family: var(--mono);
    line-height: 1.5; margin-top: 7px; padding-top: 7px; border-top: 1px solid var(--border);
  }
  .move-select {
    background: var(--bg4); border: 1px solid var(--border);
    border-radius: 5px; padding: 2px 4px;
    font-size: 10px; font-family: var(--mono); color: var(--text3); cursor: pointer; outline: none;
  }
  .move-select option { background: var(--bg2); }

  .add-col-btn {
    width: 100%; padding: 7px 8px; font-size: 11px; font-family: var(--mono);
    border: 1px dashed var(--border); background: transparent; color: var(--text3);
    border-radius: var(--radius); cursor: pointer; text-align: left; transition: all 0.15s; margin-top: 4px;
  }
  .add-col-btn:hover { background: var(--bg4); color: var(--text2); border-color: var(--border2); }
  .empty-hint { font-size: 11px; font-family: var(--mono); color: var(--text3); text-align: center; padding: 14px 8px; }

  .modal-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); z-index: 200;
    align-items: center; justify-content: center; padding: 20px;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: var(--radius-lg); padding: 22px;
    width: 100%; max-width: 460px;
    animation: slideUp 0.18s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .modal-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 18px; }
  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block; font-size: 11px; font-family: var(--mono);
    color: var(--text3); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.04em;
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%; background: var(--bg3); border: 1px solid var(--border2);
    border-radius: var(--radius); padding: 8px 10px;
    font-size: 13px; font-family: var(--sans); color: var(--text); outline: none; transition: border-color 0.15s;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color: var(--accent); }
  .form-group select option { background: var(--bg3); }
  .form-group textarea { resize: vertical; min-height: 70px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }

  .toast {
    position: fixed; bottom: 20px; right: 20px;
    background: var(--bg3); border: 1px solid var(--border2);
    border-radius: var(--radius); padding: 10px 16px;
    font-size: 12px; font-family: var(--mono); color: var(--text2);
    z-index: 300; opacity: 0; transform: translateY(8px);
    transition: opacity 0.2s, transform 0.2s; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }

  @media (max-width: 900px) { .board { grid-template-columns: repeat(2, minmax(0,1fr)); } .header-stats { display: none; } }
  @media (max-width: 560px) { .board { grid-template-columns: minmax(0,1fr); } .board, .progress-section, .phase-bar { padding-left: 12px; padding-right: 12px; } }
</style>
</head>

<header>
  <div class="logo">
    <div class="logo-mark">FT</div>
    <div>
      <div class="logo-text">FixTrack Build Board</div>
      <div class="logo-sub">AI agent project tracker</div>
    </div>
  </div>
  <div class="header-stats" id="header-stats"></div>
  <div class="header-right">
    <div class="sync-status">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-label">connecting...</span>
    </div>
    <button class="btn primary" onclick="openAddModal()">+ Add task</button>
    <button class="btn danger" onclick="resetBoard()">Reset</button>
  </div>
</header>

<div class="progress-section">
  <div class="progress-meta">
    <span id="prog-label">Loading...</span>
    <span id="prog-pct">0%</span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
</div>

<div class="phase-bar" id="phase-bar"></div>

<div class="board">
  <div class="column">
    <div class="col-header">
      <div class="col-header-left"><div class="col-dot" style="background:#555e78"></div><span class="col-title">To do</span></div>
      <span class="col-count" id="cnt-todo">0</span>
    </div>
    <div class="col-body" id="body-todo" ondragover="onDragOver(event,'todo')" ondragleave="onDragLeave(event,'todo')" ondrop="onDrop(event,'todo')"></div>
    <div style="padding:0 8px 8px"><button class="add-col-btn" onclick="openAddModal('todo')">+ Add task here</button></div>
  </div>
  <div class="column">
    <div class="col-header">
      <div class="col-header-left"><div class="col-dot" style="background:#3b82f6"></div><span class="col-title">In progress</span></div>
      <span class="col-count" id="cnt-inprogress">0</span>
    </div>
    <div class="col-body" id="body-inprogress" ondragover="onDragOver(event,'inprogress')" ondragleave="onDragLeave(event,'inprogress')" ondrop="onDrop(event,'inprogress')"></div>
    <div style="padding:0 8px 8px"><button class="add-col-btn" onclick="openAddModal('inprogress')">+ Add task here</button></div>
  </div>
  <div class="column">
    <div class="col-header">
      <div class="col-header-left"><div class="col-dot" style="background:#f59e0b"></div><span class="col-title">Blocked / waiting</span></div>
      <span class="col-count" id="cnt-blocked">0</span>
    </div>
    <div class="col-body" id="body-blocked" ondragover="onDragOver(event,'blocked')" ondragleave="onDragLeave(event,'blocked')" ondrop="onDrop(event,'blocked')"></div>
    <div style="padding:0 8px 8px"><button class="add-col-btn" onclick="openAddModal('blocked')">+ Add task here</button></div>
  </div>
  <div class="column">
    <div class="col-header">
      <div class="col-header-left"><div class="col-dot" style="background:#22c55e"></div><span class="col-title">Done</span></div>
      <span class="col-count" id="cnt-done">0</span>
    </div>
    <div class="col-body" id="body-done" ondragover="onDragOver(event,'done')" ondragleave="onDragLeave(event,'done')" ondrop="onDrop(event,'done')"></div>
    <div style="padding:0 8px 8px"><button class="add-col-btn" onclick="openAddModal('done')">+ Add task here</button></div>
  </div>
</div>

<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal">
    <div class="modal-title" id="modal-title">Add new task</div>
    <div class="form-group"><label>Task title</label><input type="text" id="f-title" placeholder="e.g. Build the login page"></div>
    <div class="form-group"><label>Phase</label><select id="f-phase"></select></div>
    <div class="form-group">
      <label>Type</label>
      <select id="f-type">
        <option value="prompt">AI prompt</option>
        <option value="terminal">Terminal command</option>
        <option value="test">Test / verify</option>
        <option value="todo">General task</option>
      </select>
    </div>
    <div class="form-group"><label>Note (optional)</label><textarea id="f-note" placeholder="Any reminder or context..."></textarea></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="saveCard()">Save task</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

  {id:'t42',title:'Create SSL certificate and set fixtrack.local hostname',phase:'Phase 11 — Deployment',type:'terminal',status:'todo',note:'openssl self-signed cert — add fixtrack.local to hosts file on each PC'},
  {id:'t43',title:'Set up automated daily database backup (2am)',phase:'Phase 11 — Deployment',type:'terminal',status:'todo',note:'crontab -e — see server setup guide Phase 6.3'},
  {id:'t44',title:'TEST — open https://fixtrack.local, log in, create a job end-to-end',phase:'Phase 11 — Deployment',type:'test',status:'todo',note:'Final sign-off: test from every device on your network'},
];

const typeLabels = {prompt:'AI prompt',terminal:'Terminal',test:'Test',todo:'Task'};
const typeClass  = {prompt:'type-prompt',terminal:'type-terminal',test:'type-test',todo:'type-todo'};

let tasks = [];
let dragId = null;
let editId = null;
let addStatus = 'todo';
let activeFilter = 'all';
let saveTimeout = null;

// ── Supabase helpers ──────────────────────────────────────
async function sbFetch(path, opts = {}) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...opts.headers
    },
    ...opts
  });
  if (!res.ok) throw new Error('Supabase error ' + res.status);
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

async function loadFromSupabase() {
  setSyncStatus('saving', 'loading...');
  try {
    const rows = await sbFetch(TABLE + '?select=*&order=id');
    if (rows.length === 0) {
      await seedDefaults();
    } else {
      tasks = rows.map(r => ({
        id: r.id, title: r.title, phase: r.phase,
        type: r.type, status: r.status, note: r.note || ''
      }));
    }
    setSyncStatus('ok', 'synced');
  } catch(e) {
    setSyncStatus('error', 'offline — using local');
    loadLocal();
  }
  render();
}

async function seedDefaults() {
  tasks = JSON.parse(JSON.stringify(DEFAULT_TASKS));
  await upsertAll(tasks);
}

async function upsertAll(taskList) {
  const rows = taskList.map(t => ({
    id: t.id, title: t.title, phase: t.phase,
    type: t.type, status: t.status, note: t.note || '',
    updated_at: new Date().toISOString()
  }));
  await sbFetch(TABLE, {
    method: 'POST',
    headers: { 'Prefer': 'resolution=merge-duplicates,return=minimal' },
    body: JSON.stringify(rows)
  });
}

async function upsertTask(t) {
  setSyncStatus('saving', 'saving...');
  try {
    await sbFetch(TABLE, {
      method: 'POST',
      headers: { 'Prefer': 'resolution=merge-duplicates,return=minimal' },
      body: JSON.stringify([{
        id: t.id, title: t.title, phase: t.phase,
        type: t.type, status: t.status, note: t.note || '',
        updated_at: new Date().toISOString()
      }])
    });
    saveLocal();
    setSyncStatus('ok', 'saved');
  } catch(e) {
    saveLocal();
    setSyncStatus('error', 'save failed');
  }
}

async function deleteFromSupabase(id) {
  setSyncStatus('saving', 'saving...');
  try {
    await sbFetch(TABLE + '?id=eq.' + id, { method: 'DELETE', headers: { 'Prefer': '' } });
    saveLocal();
    setSyncStatus('ok', 'saved');
  } catch(e) {
    saveLocal();
    setSyncStatus('error', 'save failed');
  }
}

// ── Local storage fallback ───────────────────────────────
function saveLocal() {
  try { localStorage.setItem('fixtrack_kanban_sb', JSON.stringify(tasks)); } catch(e) {}
}
function loadLocal() {
  try {
    const r = localStorage.getItem('fixtrack_kanban_sb');
    tasks = r ? JSON.parse(r) : JSON.parse(JSON.stringify(DEFAULT_TASKS));
  } catch(e) {
    tasks = JSON.parse(JSON.stringify(DEFAULT_TASKS));
  }
}

// ── Sync indicator ───────────────────────────────────────
function setSyncStatus(state, label) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  dot.className = 'sync-dot ' + state;
  lbl.textContent = label;
}

// ── Toast ────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Phase bar ────────────────────────────────────────────
function buildPhaseBar() {
  const bar = document.getElementById('phase-bar');
  bar.innerHTML = '';
  const all = document.createElement('button');
  all.className = 'phase-pill active';
  all.textContent = 'All phases';
  all.onclick = () => setFilter('all', all);
  bar.appendChild(all);
  PHASES.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'phase-pill';
    btn.textContent = p.split(' — ')[0];
    btn.title = p;
    btn.onclick = () => setFilter(p, btn);
    bar.appendChild(btn);
  });
  const selEl = document.getElementById('f-phase');
  selEl.innerHTML = PHASES.map(p => `<option value="${p}">${p}</option>`).join('');
}

function setFilter(phase, el) {
  activeFilter = phase;
  document.querySelectorAll('.phase-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  render();
}

// ── Render ────────────────────────────────────────────────
function render() {
  const cols = ['todo','inprogress','blocked','done'];
  const visible = activeFilter === 'all' ? tasks : tasks.filter(t => t.phase === activeFilter);
  cols.forEach(col => {
    const body = document.getElementById('body-' + col);
    const cards = visible.filter(t => t.status === col);
    body.innerHTML = '';
    if (cards.length === 0) {
      const hint = document.createElement('div');
      hint.className = 'empty-hint';
      hint.textContent = 'drag cards here';
      body.appendChild(hint);
    } else {
      cards.forEach(t => body.appendChild(makeCard(t)));
    }
    document.getElementById('cnt-' + col).textContent = cards.length;
  });
  updateStats();
}

function phaseColor(phase) {
  const i = PHASES.indexOf(phase);
  return i >= 0 ? PHASE_COLORS[i] : '#64748b';
}

function makeCard(t) {
  const div = document.createElement('div');
  div.className = 'card';
  div.draggable = true;
  div.dataset.id = t.id;
  div.innerHTML = `
    <div class="card-phase-tag" style="color:${phaseColor(t.phase)}">${t.phase.split(' — ')[0]}</div>
    <div class="card-title">${esc(t.title)}</div>
    <div class="card-footer">
      <span class="type-badge ${typeClass[t.type]}">${typeLabels[t.type]}</span>
      <div class="card-actions">
        <select class="move-select" onchange="moveCard('${t.id}',this.value)" title="Move to column">
          <option value="todo"${t.status==='todo'?' selected':''}>To do</option>
          <option value="inprogress"${t.status==='inprogress'?' selected':''}>In progress</option>
          <option value="blocked"${t.status==='blocked'?' selected':''}>Blocked</option>
          <option value="done"${t.status==='done'?' selected':''}>Done</option>
        </select>
        <button class="card-btn" onclick="editCard('${t.id}')">edit</button>
        <button class="card-btn del" onclick="deleteCard('${t.id}')">del</button>
      </div>
    </div>
    ${t.note ? `<div class="card-note">${esc(t.note)}</div>` : ''}
  `;
  div.addEventListener('dragstart', e => { dragId = t.id; div.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
  div.addEventListener('dragend', () => { dragId = null; div.classList.remove('dragging'); document.querySelectorAll('.col-body').forEach(b => b.classList.remove('drag-over')); });
  return div;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function updateStats() {
  const total = tasks.length;
  const done  = tasks.filter(t=>t.status==='done').length;
  const prog  = tasks.filter(t=>t.status==='inprogress').length;
  const todo  = tasks.filter(t=>t.status==='todo').length;
  const block = tasks.filter(t=>t.status==='blocked').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-label').textContent = `Overall progress — ${done} of ${total} tasks complete`;
  document.getElementById('header-stats').innerHTML = `
    <div class="hstat">To do: <b>${todo}</b></div>
    <div class="hstat">In progress: <b>${prog}</b></div>
    <div class="hstat">Blocked: <b>${block}</b></div>
    <div class="hstat">Done: <b>${done}</b></div>
  `;
}

// ── Drag & drop ───────────────────────────────────────────
function onDragOver(e, col) { e.preventDefault(); document.getElementById('body-'+col).classList.add('drag-over'); }
function onDragLeave(e, col) { document.getElementById('body-'+col).classList.remove('drag-over'); }
function onDrop(e, col) {
  e.preventDefault();
  document.getElementById('body-'+col).classList.remove('drag-over');
  if (!dragId) return;
  const t = tasks.find(x => x.id === dragId);
  if (t && t.status !== col) { t.status = col; render(); upsertTask(t); }
}
function moveCard(id, newStatus) {
  const t = tasks.find(x => x.id === id);
  if (t && t.status !== newStatus) { t.status = newStatus; render(); upsertTask(t); }
}

// ── Add / Edit ────────────────────────────────────────────
function openAddModal(status) {
  addStatus = status || 'todo';
  editId = null;
  document.getElementById('modal-title').textContent = 'Add new task';
  document.getElementById('f-title').value = '';
  document.getElementById('f-note').value  = '';
  document.getElementById('f-type').value  = 'prompt';
  document.getElementById('f-phase').value = PHASES[0];
  document.getElementById('modal-backdrop').classList.add('open');
  setTimeout(() => document.getElementById('f-title').focus(), 80);
}

function editCard(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  editId = id;
  document.getElementById('modal-title').textContent = 'Edit task';
  document.getElementById('f-title').value = t.title;
  document.getElementById('f-note').value  = t.note || '';
  document.getElementById('f-type').value  = t.type;
  document.getElementById('f-phase').value = t.phase;
  document.getElementById('modal-backdrop').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('open');
  editId = null;
}

function saveCard() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').focus(); return; }
  const phase = document.getElementById('f-phase').value;
  const type  = document.getElementById('f-type').value;
  const note  = document.getElementById('f-note').value.trim();
  if (editId) {
    const t = tasks.find(x => x.id === editId);
    if (t) { t.title = title; t.phase = phase; t.type = type; t.note = note; upsertTask(t); }
  } else {
    const t = { id: 'u' + Date.now(), title, phase, type, note, status: addStatus };
    tasks.push(t);
    upsertTask(t);
  }
  render(); closeModal();
  showToast(editId ? 'Task updated' : 'Task added');
}

function deleteCard(id) {
  if (!confirm('Delete this task?')) return;
  tasks = tasks.filter(x => x.id !== id);
  render();
  deleteFromSupabase(id);
  showToast('Task deleted');
}

async function resetBoard() {
  if (!confirm('Reset to all default tasks? This will overwrite everything in the database.')) return;
  setSyncStatus('saving', 'resetting...');
  try {
    await sbFetch(TABLE + '?id=neq.NONE', { method: 'DELETE', headers: { 'Prefer': '' } });
    await seedDefaults();
    setSyncStatus('ok', 'reset complete');
    render();
    showToast('Board reset to defaults');
  } catch(e) {
    tasks = JSON.parse(JSON.stringify(DEFAULT_TASKS));
    saveLocal();
    setSyncStatus('error', 'reset failed');
    render();
  }
}

// ── Keyboard & backdrop close ────────────────────────────
document.getElementById('modal-backdrop').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-backdrop')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Boot ──────────────────────────────────────────────────
buildPhaseBar();
loadFromSupabase();
</script>
</body>
</html>
